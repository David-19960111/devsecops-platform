services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - user-service 

  user-service:
    build: ./user-service 
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      JWT_SECRET: ${JWT_SECRET}