services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - user-service 

  user-service:
    build: ./user-service 
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      JWT_SECRET: ${JWT_SECRET}

  order-service:
    build: ./order-service
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      ENV: development

  notification-service:
    build: ./notification-service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003

  prometheus:
    image: prom/prometheus:v2.49.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus